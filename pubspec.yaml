name: conduit
description: "A minimal SSH client for Android and iOS."
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  connectivity_plus: ^6.1.0
  cupertino_icons: ^1.0.8
  dartssh2: ^2.17.1
  xterm: ^4.0.0
  dart_mosh: ^0.0.2
  flutter_secure_storage: ^10.3.1
  local_auth: ^3.0.1
  uuid: ^4.5.3
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  adaptive_icon_monochrome: "assets/icon/icon_foreground.png"

flutter:
  uses-material-design: true
  fonts:
    - family: AtkynsonMonoNerdFontMono
      fonts:
        - asset: assets/fonts/AtkynsonMonoNerdFontMono-Regular.otf
